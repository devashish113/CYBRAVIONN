  <!-- FAQ Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is VAPT and why is it important?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "VAPT (Vulnerability Assessment and Penetration Testing) is a structured approach to identifying and exploiting security weaknesses in your applications, networks, and cloud infrastructure. It helps organizations proactively discover vulnerabilities before attackers do, reducing the risk of data breaches and ensuring compliance with standards like ISO 27001 and SOC 2."
        }
      },
      {
        "@type": "Question",
        "name": "Do you work with startups and small businesses?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. CYBRAVION works with enterprises, SMEs, startups, and government institutions. Our services are scaled to fit the size and maturity of your organization — from lightweight compliance assessments for early-stage startups to full enterprise GRC programs."
        }
      },
      {
        "@type": "Question",
        "name": "How long does a security assessment take?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Timelines depend on scope and complexity. A focused VAPT engagement typically takes 1–3 weeks. Comprehensive GRC assessments or security architecture reviews may take 4–8 weeks. We provide a clear timeline during the scoping phase so there are no surprises."
        }
      },
      {
        "@type": "Question",
        "name": "Do you provide implementation or only consulting?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We provide both. CYBRAVION delivers end-to-end services — from advisory and strategy through to hands-on implementation, deployment coordination, and post-deployment optimization. Our goal is measurable risk reduction, not just reports."
        }
      },
      {
        "@type": "Question",
        "name": "How do you ensure compliance with ISO and NIST standards?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We conduct gap assessments against your target framework (ISO 27001, NIST CSF, SOC 2, DPDP Act), develop remediation roadmaps, build required documentation (policies, procedures, ISMS), and support you through the audit process. Our approach ensures compliance is embedded into operations, not treated as a one-time project."
        }
      }
    ]
  }
